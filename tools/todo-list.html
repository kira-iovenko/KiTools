                <button id="darkMode">Dark Mode</button>

        <main class="main-view">
            <div class="tool todo-list"> 
                <h2>Todo List</h2>
                <div>
                    <input type="text" id="taskInput" placeholder="Task...">
                    <input type="date" id="taskDateInput">
                    <input type="time" id="taskTimeInput">
                    <button>Add</button>
                </div>
                <table id="todo-list-table">
                    <thead>
                        <tr>
                            <th></th>
                            <th>Task</th>
                            <th>Due Date</th>
                            <th>Time</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
