<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Banner Generator - KITools</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h1>KITools</h1>
            <nav>
                <ul>
                    <li><a href="../index.html">Home</a></li>
                </ul>
                <p class="category">Text</p>
                <ul>
                    <li><a href="whitespace.html">Whitespace Remover</a></li>
                    <li><a href="preview-html.html">HTML Preview</a></li>
                    <li><a href="json-formatter.html">JSON Formatter</a></li>
                </ul>
                <p class="category">Times</p>
                <ul>
                    <li><a href="timer.html">Timer</a></li>
                    <li><a href="pomodoro.html">Pomodoro</a></li>                    
                </ul>
                <p class="category">Utility</p>
                <ul>
                    <li><a href="coin.html">Coin Flip</a></li>
                    <li><a href="flashcards.html">Flashcards</a></li>
                    <li><a href="todo-list.html">Todo List</a></li>
                </ul>
                <p class="category">Design</p>
                <ul>
                    <li><a href="qrCode.html">QR Code Generator</a></li>
                    <span class="active">Banner Generator</span>
                </ul>
            </nav>
            <div class="settings-btns">
                <button id="darkMode">Dark Mode</button>
                <button id="toggleQueenie">Hide Queenie</button>
            </div>
        </aside>
        <main class="main-view">
            <div class="tool banner-generator">
                <div class="banner-info">
                    <h2>Banner Generator</h2>
                    <div class="banner-info-controls">
                        <div class="tool-info-group">
                            <input type="text" id="bannerTitleInput" placeholder="Title">
                            <input type="text" id="bannerSubtitleInput" placeholder="Subtitle">
                        </div>
                        <div class="tool-info-group">
                            <div class="tool-info-row">
                                <label>Background Image</label>
                                <input type="file" id="bannerImageUpload" accept="image/*">
                            </div>
                            <div class="tool-info-row">
                                <label>Background Color</label>
                                <input type="color" id="bannerBgColor" value="#b8e0d2">
                            </div>
                            <div class="tool-info-row">
                                <label>Title Color</label>
                                <input type="color" id="bannerTitleColor" value="#2b3d33">
                            </div>
                            <div class="tool-info-row">
                                <label>Subtitle Color</label>
                                <input type="color" id="bannerSubtitleColor" value="#000000">
                            </div>
                        </div>
                        <div class="tool-info-group">
                            <div class="tool-info-row">
                                <label>Title Size</label>
                                <input type="range" id="bannerTitleSize" min="20" max="80" value="48">
                            </div>
                            <div class="tool-info-row">
                                <label>Subtitle Size</label>
                                <input type="range" id="bannerSubtitleSize" min="5" max="60" value="20">
                            </div>
                        </div>
                        <div class="tool-info-group hidden" id="bannerImageControls">
                            <div class="tool-info-row">
                                <label>Image X-axis</label>
                                <input type="range" id="bannerImageX" min="-200" max="200" value="0">
                            </div>
                            <div class="tool-info-row">
                                <label>Image Y-axis</label>
                                <input type="range" id="bannerImageY" min="-200" max="200" value="0">
                            </div>
                            <div class="tool-info-row">
                                <label>Image Zoom</label>
                                <input type="range" id="bannerImageZoom" min="0.5" max="3" step="0.1" value="1">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="banner-and-bannerBtns">
                    <div class="banner-display" id="banner">
                        <img id="bannerImage" style="display:none;">
                        <h1 id="bannerTitle">Title</h1>
                        <p id="bannerSubtitle">Subtitle</p>
                    </div>
                    <div class="banner-buttons">
                        <button id="downloadBannerBtn">Download Banner</button>
                        <button id="resetBannerBtn">Reset Banner</button>
                        <button id="removeBgImageBtn">Remove Image</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="../js/banner.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="../js/script.js"></script>
    <script src="../js/queenie.js"></script>
</body>
</html>
