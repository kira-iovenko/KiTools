<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>QR Code Generator - KITools</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h1>KITools</h1>
            <nav>
                <ul>
                    <li><a href="../index.html">Home</a></li>
                </ul>
                <p class="category">Text</p>
                <ul>
                    <li><a href="whitespace.html">Whitespace Remover</a></li>
                    <li><a href="preview-html.html">HTML Preview</a></li>
                </ul>
                <p class="category">Times</p>
                <ul>
                    <li><a href="timer.html">Timer</a></li>
                    <li><a href="pomodoro.html">Pomodoro</a></li>
                </ul>
                <p class="category">Utility</p>
                <ul>
                    <li><a href="coin.html">Coin Flip</a></li>
                    <li><a href="flashcards.html">Flashcards</a></li>
                </ul>
                <p class="category">Design</p>
                <ul>
                    <span class="active">QR Code Generator</span>
                    <li><a href="banner.html">Banner Generator</a></li>
                </ul>
            </nav>
            <button id="darkMode">Dark Mode</button>
        </aside>
        <main class="main-view">
            <div class="tool">
                <h2>QR Code Generator</h2>
                <div class="qrCode-container">
                    <div class="qrCode-info">
                        <label>Qr Type: </label>
                        <select id="qrType">
                            <option value="text">Text</option>
                            <option value="url">URL</option>
                            <option value="phone">Phone</option>
                            <option value="wifi">Wifi</option>
                        </select>
                        <input type="text" id="qrInput" placeholder="Enter text, URL, etc...">
                        <div id="qrWifiField" style="display: none;">
                            <input type="text" id="wifiSSID"placeholder="SSID">
                            <input type="text" id="wifiPassword" placeholder="Password">
                            <select id="encryptionWifi">
                                <option value="WPA">WPA/WPA2</option>
                                <option value="WEP">WEP</option>
                                <option value="nopass">No password</option>
                            </select>
                        </div>
                        <label>Foreground color: </label>
                        <input type="color" id="qrColor" value="#000000">
                        <label>Background color: </label>
                        <input type="color" id="qrBgColor" value="#ffffff">
                    </div>
                    <div class="qrCode-right">
                        <div class="qrCode-display">
                            <p class="qrCode-widget-label">QR code will appear here:</p>
                            <div id="qrCode"></div>
                        </div>
                        <button id="downloadQrBtn">Download QR Code</button>
                    </div>        
                    
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="../js/qrCode.js"></script>
    <script src="../js/script.js"></script>
</body>
