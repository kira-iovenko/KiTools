<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flashcards - KITools</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h1>KITools</h1>
            <nav>
                <ul>
                    <li><a href="../index.html">Home</a></li>
                </ul>
                <p class="category">Text</p>
                <ul>
                    <li><a href="whitespace.html">Whitespace Remover</a></li>
                </ul>
                <p class="category">Times</p>
                <ul>
                    <li><a href="pomodoro.html">Pomodoro</a></li>
                </ul>
                
                <p class="category">Utility</p>
                <ul>
                    <li><a href="coin.html">Coin Flip</a></li>
                    <span class="active">Flashcards</span>
                </ul>
            </nav>
        </aside>
        <main class="main-view">
            <div class="flashcards-app">
                <section id="deckView">
                    <header class="flashcards-header">
                        <h2>Flashcards</h2>
                        <div class="flashcards-actions">
                            <input type="text" id="deckSearchInput" placeholder="Search decks...">
                            <button id="addDeckBtn">New Deck</button>
                        </div>
                    </header>

                    <div id="deckEmptyMessage">No decks created yet.</div>
                    <div id="deckGrid" class="deck-grid"></div>
                </section>

                <section id="cardView" class="hidden">
                    <header class="flashcards-header">
                        <button id="backToDecksBtn">Back</button>
                        <div class="flashcards-actions">
                            <input type="text" id="searchInput" placeholder="search cards...">
                            <button id="addCardBtn">Add Card</button>
                        </div>
                    </header>
                    <div class="card-wrapper">
                        <div class="flashcard" id="flashcard">
                            <div class="card-side card-front">
                                <p>Select a card</p>
                            </div>
                            <div class="card-side card-back">
                                <p id="cardBack"></p>
                            </div>
                        </div>
                    </div>
                    <div class="card-controls">
                        <button id="prevCard">Previous</button>
                        <button id="flipCard">Flip</button>
                        <button id="nextCard">Next</button>
                    </div>
                    <div id="cardGrid" class = "card-grid"></div>
                </section>
            </div>

            <div id="modal" class="modal hidden">
                <div class="modal-content">
                    <h3 id="modalTitle">Add Card</h3>
                    <input type="text" id="frontInput" placeholder="Question...">
                    <input type="text" id="backInput" placeholder="Answer...">
                    <div class="modal-buttons">
                        <button id="saveBtn">Save</button>
                        <button id="cancelBtn">Cancel</button>
                    </div>
                </div>
            </div>

            <div id="deckModal" class="modal hidden">
                <div class="modal-content">
                    <h3>Create Deck</h3>
                    <input type="text" id="deckTitleInput" placeholder="Deck title...">
                    <div class="modal-buttons">
                        <button id="saveDeckBtn">Create</button>
                        <button id="cancelDeckBtn">Cancel</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="../js/flashcards.js" defer></script>
</body>
